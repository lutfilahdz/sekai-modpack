[flavor_groups.package]
name = "Preset"
description = "Choose the mod preset that best suits your needs in Sekai Survival.\nAvailable presets: Complete (full features) and Performance (essential mods with performance optimizations)."
side = "both"
[[flavor_groups.package.choices]]
id = "package_complete"
name = "Complete"
description = "Complete preset with optimization and additional quality of life features for the best gaming experience.\nJust install and play without any hassle!"
[[flavor_groups.package.choices]]
id = "package_basic"
name = "Performance"
description = "Essential mods enhanced with performance optimization mods.\nPerfect for players who want better performance without extra features."

[flavor_groups.rendering]
name = "Rendering"
description = "Choose your rendering setup. Both options use Sodium for performance optimization. Choose 'With Shaders' if you want to use shader packs for enhanced visuals."
side = "client"
[[flavor_groups.rendering.choices]]
id = "shaders_on"
name = "With Shaders"
description = "Sodium for performance optimization, plus Iris for shader pack support. Choose this if you want to use shaders for enhanced visual effects."
[[flavor_groups.rendering.choices]]
id = "shaders_off"
name = "Without Shaders"
description = "Sodium for performance optimization, without Iris. Choose this if you don't want to use shaders and prefer a simpler setup with potentially better performance."

[flavor_groups.distant_horizons]
name = "Distant Horizons"
description = "Choose whether to enable Distant Horizons, a mod that adds Level of Detail (LOD) rendering to see much farther with minimal performance impact.\nThe server supports Distant Horizons, so chunks will be downloaded from the server on first join instead of being rendered manually, much more convenient and less demanding.\nWARNING: Will download A LOT OF DATA on first join and may cause temporary high ping."
side = "both"
choices = ["distant_horizons_off", "distant_horizons_on"]

[flavor_groups.zoomify]
name = "Zoomify"
description = "Choose whether to use Zoomify, a mod that adds zoom functionality to the game."
side = "client"
choices = ["zoomify_off", "zoomify_on"]

[flavor_groups.block_meter]
name = "Block Meter"
description = "Choose whether to use Block Meter, a mod that displays information about the block you are looking at."
side = "both"
choices = ["block_meter_off", "block_meter_on"]

[flavor_groups.data_saver]
name = "Data Saver Mode"
description = "Choose whether to use Data Saver Mode, will disable mods that consume a lot of data, such as:\n- What Are They Up To (Watut)\nRecommended for players with slow or limited internet connections, or those who want to reduce data usage while playing on the server."
side = "both"
choices = ["data_saver_off", "data_saver_on"]

[flavor_groups.early_loading_screen]
name = "Early Loading Screen"
description = "Choose whether to use the early loading screen, which displays a loading screen before the main menu.\nKnown issue: can crash on Linux Wayland in some setups.\nIf you use native Wayland and experience crashes, disable this option or run Minecraft through XWayland/X11."
side = "client"
choices = ["early_loading_screen_off", "early_loading_screen_on"]

